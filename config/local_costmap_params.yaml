# ============================================================
# Local Costmap Parameters
# High-frequency reactive layer for obstacle avoidance
# Rolling window follows the robot
# ============================================================

local_costmap:
  global_frame: odom
  robot_base_frame: base_link

  update_frequency: 5.0           # Hz - reactive updates
  publish_frequency: 2.0            # Hz

  static_map: false
  rolling_window: true

  width: 3.0                       # meters
  height: 3.0                      # meters
  resolution: 0.05                  # 5cm cells

  origin_x: -1.5
  origin_y: -1.5

  # Plugins - order matters!
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
